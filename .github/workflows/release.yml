name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version override
        required: false
        type: string

jobs:
  gui-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Prepare scripts
        run: chmod +x mac_app/gui/build_gui_app.sh scripts/package_gui_release.sh

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(tr -d '\n' < VERSION)"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build release package
        env:
          APP_VERSION_OVERRIDE: ${{ steps.version.outputs.value }}
          DOWNLOAD_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        shell: bash
        run: |
          set -o pipefail
          ./scripts/package_gui_release.sh 2>&1 | tee build-package.log

      - name: Verify packaged board visual assets
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/gui_app/DBT-Agent-${{ steps.version.outputs.value }}.zip"
          test -f "${archive}"
          unzip -Z1 "${archive}" | tee release-archive-contents.txt
          required_assets=(
            "DBT-Agent.app/Contents/Resources/BoardAssets/boards/TaishanPi/assets/models/1M-RK3566/preview.obj"
            "DBT-Agent.app/Contents/Resources/BoardAssets/boards/TaishanPi/assets/models/1M-RK3566/3D_PCB_2026-04-03.mtl"
            "DBT-Agent.app/Contents/Resources/BoardAssets/boards/ColorEasyPICO2/assets/models/ColorEasyPICO2/preview.obj"
            "DBT-Agent.app/Contents/Resources/BoardAssets/boards/ColorEasyPICO2/assets/models/ColorEasyPICO2/3D_PCB1_V1.0.4_2026-04-03.mtl"
            "DBT-Agent.app/Contents/Resources/Pico2WPreview.png"
          )
          for asset in "${required_assets[@]}"; do
            grep -Fx "${asset}" release-archive-contents.txt
          done

      - name: Print build log
        if: always()
        shell: bash
        run: |
          if [[ -f build-package.log ]]; then
            echo "===== build-package.log ====="
            cat build-package.log
          fi

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gui_app/DBT-Agent-*.zip
            dist/gui_app/manifest.json
            dist/gui_app/toolkit-manifest.json

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-release-diagnostics
          path: |
            build-package.log
            release-archive-contents.txt
            mac_app/gui/build
            dist/gui_app
