name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gui-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Prepare scripts
        run: chmod +x mac_app/swift-cli/build_swift_cli.sh mac_app/gui/build_gui_app.sh scripts/package_gui_release.sh

      - name: Build release package
        shell: bash
        run: |
          set -o pipefail
          ./scripts/package_gui_release.sh 2>&1 | tee build-package.log

      - name: Upload GUI artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gui-app
          path: dist/gui_app/*

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-build-diagnostics
          path: |
            build-package.log
            mac_app/gui/build
            dist/gui_app
